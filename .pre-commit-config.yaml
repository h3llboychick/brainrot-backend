repos:
- repo: https://github.com/pre-commit/pre-commit-hooks # general hooks for pre-commit
  rev: v6.0.0
  hooks:
    - id: trailing-whitespace
    - id: end-of-file-fixer
      exclude: \.ini$
    - id: check-yaml
    - id: check-json
    - id: check-added-large-files

- repo: https://github.com/astral-sh/ruff-pre-commit # linter and code formatter
  rev: v0.15.7
  hooks:
    - id: ruff-check
      args: [--fix ]
      files: \.pyi?$
    - id: ruff-format
      files: \.pyi?$

- repo: https://github.com/pre-commit/mirrors-mypy # static type checker
  rev: v1.19.1
  hooks:
    - id: mypy
      args: [--ignore-missing-imports]
      exclude: ^alembic/
      additional_dependencies: [types-requests, types-python-dateutil]

- repo: https://github.com/PyCQA/bandit # security linter
  rev: 1.9.4
  hooks:
    - id: bandit

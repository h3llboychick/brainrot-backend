services:
  rabbitmq:
    image: "rabbitmq:3-management"
    container_name: "rabbitmq"
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASSWORD}
    ports:
      - "5672:5672"
      - "15672:15672"
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - backend_network
  redis:
    image: "redis:latest"
    container_name: "redis"
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    ports:
      - "6379:6379"
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - redis_data:/data
    networks:
      - backend_network
  db:
    image: "postgres:latest"
    container_name: "db"
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - db_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    restart: unless-stopped
    env_file:
        - .env  
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - backend_network
  worker-1:
    image: worker-base:py311-alpine-2025-10-31
    working_dir: /app
    env_file:
      - ./src/infrasturcture/worker/.env
    container_name: "worker-1"
    restart: unless-stopped
    networks:
      - backend_network
    volumes:
      - ./src/infrasturcture/worker/worker:/app/worker:rw
      - ./src/infrasturcture/worker/media:/app/media:rw
    command: ["celery", "-A", "worker.app", "worker", "--loglevel=info"]
  minio:
    image: quay.io/minio/minio
    container_name: minio
    environment:
      - MINIO_ROOT_USER=${MINIO_ROOT_USER}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD}
    command: server /data --console-address ":9001"
    networks:
      backend_network:
        aliases:
          - minio
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
volumes:
  redis_data:
  db_data:
  rabbitmq_data:
  minio_data:
    driver: local
    driver_opts:
      type: none
      device: C:\minio_data
      o: bind
networks:
  backend_network:
    driver: bridge
